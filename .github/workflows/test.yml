name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Single hermetic suite — no compose checkout, no secrets, no Docker/model
  # access. Runs both packages in one process to preserve the cross-package
  # contamination guard. Cross-repo contract tests skip when compose/contracts
  # is absent; live model/Docker judge gates skip without OPENAI_API_KEY. To run
  # those for real, check out compose as a sibling and export OPENAI_API_KEY
  # locally (or wire a manual job later).
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install stratum-py (dev)
        run: pip install -e ".[dev]"

      - name: Install stratum-mcp
        run: pip install -e "stratum-mcp"

      - name: Hermetic combined suite (cross-contamination guard)
        run: pytest tests/ stratum-mcp/tests/ --ignore=tests/test_e2e.py --timeout=15 -q
