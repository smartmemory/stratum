name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  combined-suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install stratum-py (dev)
        run: pip install -e ".[dev]"

      - name: Install stratum-mcp
        run: pip install -e "stratum-mcp"

      - name: Combined suite (cross-contamination guard)
        run: pytest tests/ stratum-mcp/tests/ --ignore=tests/test_e2e.py --timeout=15 -x -q
