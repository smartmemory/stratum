name: Publish to PyPI

on:
  push:
    branches: [main]
    paths:
      - "stratum-mcp/pyproject.toml"
      - "pyproject.toml"

jobs:
  publish-mcp:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build stratum-mcp
        run: python -m build
        working-directory: stratum-mcp

      - name: Publish stratum-mcp
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: stratum-mcp/dist/

  publish-py:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build stratum-py
        run: python -m build

      - name: Publish stratum-py
        uses: pypa/gh-action-pypi-publish@release/v1
